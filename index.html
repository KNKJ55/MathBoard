<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background-color: #000000;
            color: #ffffff;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid #000000;
        }
        
        .title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .subtitle {
            font-size: 16px;
            font-weight: 300;
            margin-bottom: 20px;
        }
        
        .container {
            flex: 1;
            padding: 30px 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            border: 2px solid #000000;
        }
        
        td {
            padding: 18px 25px;
            border: 1px solid #000000;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        td:hover {
            background-color: #000000;
            color: #ffffff;
        }
        
        .footer {
            background-color: #000000;
            color: #ffffff;
            padding: 25px 20px;
            text-align: center;
        }
        
        .footer-row {
            font-size: 13px;
            letter-spacing: 0.5px;
            padding: 8px 0;
        }
        
        .footer-row:last-child {
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px solid #ffffff;
        }
        
        @media (max-width: 600px) {
            .title {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 14px;
            }
            
            td {
                padding: 15px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="title">Math Board</h1>
        <p class="subtitle">注：所有内容均来自于网络搜索，仅用于学校教学及个人研究，严禁用于商业用途！如有侵权，请联系 knkj55@proton.me 删除。</p>
    </header>
    
    <main class="container">
        <table>
            <tbody>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/内切球万能公式模型.html','_blank')">内切球万能公式模型</td>
                </tr>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/外接球模型：垂面模型.html','_blank')">外接球模型：垂面模型</td>
                </tr>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/外接球模型：斗笠模型.html','_blank')">外接球模型：斗笠模型</td>
                </tr>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/外接球模型：对棱相等模型.html','_blank')">外接球模型：对棱相等模型</td>
                </tr>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/外接球模型：汉堡模型.html','_blank')">外接球模型：汉堡模型</td>
                </tr>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/外接球模型：墙角模型.html','_blank')">外接球模型：墙角模型</td>
                </tr>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/外接球模型：切瓜模型.html','_blank')">外接球模型：切瓜模型</td>
                </tr>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/外接球模型：折叠模型.html','_blank')">外接球模型：折叠模型</td>
                </tr>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/正方体的内切球、棱切球、外接球的演变.html','_blank')">正方体的内切球、棱切球、外接球的演变</td>
                </tr>
                <tr>
                    <td onclick="window.open('https://knkj55.github.io/MathBoard/pages/正四面体的内切球、棱切球、外接球的演变.html','_blank')">正四面体的内切球、棱切球、外接球的演变</td>
                </tr>
            </tbody>
        </table>
    </main>
    
    <footer class="footer">
        <div class="footer-row">爱来自 @科家</div>
        <div class="footer-row">Powered By GithubPages</div>
    </footer>
</body>
